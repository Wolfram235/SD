<line x1="275" y1="462" x2="270" y2="403" stroke="#A03050" stroke-width="1.3" opacity="0.5"/>
<line x1="289" y1="462" x2="285" y2="401" stroke="#A03050" stroke-width="1.3" opacity="0.5"/>
<line x1="305" y1="462" x2="305" y2="400" stroke="#A03050" stroke-width="1.3" opacity="0.5"/>
<line x1="321" y1="462" x2="325" y2="401" stroke="#A03050" stroke-width="1.3" opacity="0.5"/>
<line x1="335" y1="462" x2="340" y2="403" stroke="#A03050" stroke-width="1.3" opacity="0.5"/>

<!-- Frosting dome -->
