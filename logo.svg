        white dripping icing, toppings: strawberry, wavy candy,
        macaron, macaron, strawberry, wavy candy + half-heart between macarons
═══════════════════════════════════════════════════ -->

<!-- cake shadow -->
<ellipse cx="108" cy="462" rx="78" ry="9" fill="#7a2a44" opacity="0.35"/>

<!-- CAKE BODY — dark pink with white spots -->
<rect x="38" y="340" width="140" height="120" rx="8" fill="#D4708A"/>
<!-- spots on cake body -->
<circle cx="65"  cy="365" r="5" fill="#E890A8" opacity="0.7"/>
<circle cx="95"  cy="380" r="4" fill="#E890A8" opacity="0.6"/>
<circle cx="128" cy="362" r="6" fill="#E890A8" opacity="0.7"/>
<circle cx="55"  cy="400" r="4" fill="#E890A8" opacity="0.6"/>
<circle cx="112" cy="405" r="5" fill="#E890A8" opacity="0.7"/>
<circle cx="148" cy="388" r="4" fill="#E890A8" opacity="0.6"/>
<circle cx="78"  cy="420" r="5" fill="#E890A8" opacity="0.6"/>
<circle cx="140" cy="428" r="3" fill="#E890A8" opacity="0.5"/>

<!-- WHITE DRIP ICING on top -->
<!-- flat top -->
<rect x="38" y="332" width="140" height="14" rx="4" fill="#fff"/>
<!-- drips -->
<path d="M50,346 Q52,358 50,368" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M68,346 Q71,362 69,374" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M88,346 Q90,355 89,363" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M108,346 Q111,365 109,376" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/>
<path d="M128,346 Q130,357 129,366" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M148,346 Q150,360 149,370" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
<!-- cake base plate -->
<rect x="32" y="457" width="152" height="8" rx="4" fill="#B85878"/>

<!-- TOPPINGS left to right: strawberry, wavy-candy, macaron, macaron, wavy-candy, strawberry -->
<!-- with half-heart between the two macarons -->

<!-- 1. Strawberry (leftmost) -->
<g transform="translate(52, 318)">
  <ellipse cx="0" cy="0" rx="10" ry="13" fill="#D03050"/>
  <path d="M-5,-10 Q0,-18 5,-10" fill="#4a8030"/>
  <path d="M0,-13 Q2,-20 0,-22" stroke="#4a8030" stroke-width="2" fill="none"/>
  <!-- seeds -->
  <ellipse cx="-3" cy="-4" rx="1.5" ry="1" fill="#fff" opacity="0.7" transform="rotate(-20,-3,-4)"/>
  <ellipse cx="3"  cy="-2" rx="1.5" ry="1" fill="#fff" opacity="0.7" transform="rotate(20,3,-2)"/>
  <ellipse cx="0"  cy="4"  rx="1.5" ry="1" fill="#fff" opacity="0.7"/>
</g>

<!-- 2. Wavy candy (pink with waves) -->
<g transform="translate(74, 316)">
  <rect x="-9" y="-14" width="18" height="28" rx="5" fill="#F080A0"/>
  <path d="M-9,-6 Q-4,-10 0,-6 Q4,-2 9,-6" stroke="#fff" stroke-width="2" fill="none"/>
  <path d="M-9,2  Q-4,-2  0,2  Q4,6  9,2"  stroke="#fff" stroke-width="2" fill="none"/>
  <line x1="0" y1="-14" x2="0" y2="-20" stroke="#C05070" stroke-width="2.5"/>
</g>

<!-- 3. Macaron LEFT -->
<g transform="translate(96, 314)">
  <!-- bottom shell -->
  <ellipse cx="0" cy="6"  rx="13" ry="7" fill="#F4A0B8"/>
  <!-- filling -->
  <rect x="-13" y="2" width="26" height="5" fill="#FDE0EA"/>
  <!-- top shell -->
  <ellipse cx="0" cy="-1" rx="13" ry="7" fill="#F4A0B8"/>
  <!-- top shell highlight -->
  <ellipse cx="-3" cy="-3" rx="5" ry="3" fill="#fff" opacity="0.2"/>
</g>

<!-- HALF HEART between macarons -->
<g transform="translate(116, 310)">
  <!-- right half of a heart -->
  <path d="M0,0 Q0,-10 8,-10 Q16,-10 16,0 Q16,8 0,18 Z" fill="#E84070" opacity="0.9"/>
</g>

<!-- 4. Macaron RIGHT -->
<g transform="translate(136, 314)">
  <ellipse cx="0" cy="6"  rx="13" ry="7" fill="#F4A0B8"/>
  <rect x="-13" y="2" width="26" height="5" fill="#FDE0EA"/>
  <ellipse cx="0" cy="-1" rx="13" ry="7" fill="#F4A0B8"/>
  <ellipse cx="-3" cy="-3" rx="5" ry="3" fill="#fff" opacity="0.2"/>
</g>

<!-- 5. Wavy candy RIGHT -->
<g transform="translate(158, 316)">
  <rect x="-9" y="-14" width="18" height="28" rx="5" fill="#F080A0"/>
  <path d="M-9,-6 Q-4,-10 0,-6 Q4,-2 9,-6" stroke="#fff" stroke-width="2" fill="none"/>
  <path d="M-9,2  Q-4,-2  0,2  Q4,6  9,2"  stroke="#fff" stroke-width="2" fill="none"/>
  <line x1="0" y1="-14" x2="0" y2="-20" stroke="#C05070" stroke-width="2.5"/>
</g>

<!-- 6. Strawberry (rightmost) -->
<g transform="translate(178, 318)">
  <ellipse cx="0" cy="0" rx="10" ry="13" fill="#D03050"/>
  <path d="M-5,-10 Q0,-18 5,-10" fill="#4a8030"/>
  <path d="M0,-13 Q2,-20 0,-22" stroke="#4a8030" stroke-width="2" fill="none"/>
  <ellipse cx="-3" cy="-4" rx="1.5" ry="1" fill="#fff" opacity="0.7" transform="rotate(-20,-3,-4)"/>
  <ellipse cx="3"  cy="-2" rx="1.5" ry="1" fill="#fff" opacity="0.7" transform="rotate(20,3,-2)"/>
  <ellipse cx="0"  cy="4"  rx="1.5" ry="1" fill="#fff" opacity="0.7"/>
</g>

<!-- sparkle near cake -->
<g transform="translate(26,360)" opacity="0.75">
  <line x1="0" y1="-9" x2="0" y2="9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="-9" y1="0" x2="9" y2="0" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="-4" y1="-4" x2="4" y2="4" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="-4" x2="-4" y2="4" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
</g>

<!-- ═══════════════════════════════════════════════════
     2. PASTRY TRIANGLE — chocolate slice, white icing, red heart
═══════════════════════════════════════════════════ -->

<!-- shadow -->
<ellipse cx="222" cy="462" rx="38" ry="7" fill="#7a2a44" opacity="0.3"/>

<!-- Triangle cake slice body (chocolate brown) -->
<polygon points="192,460 252,460 222,340" fill="#7B3A1C"/>
<!-- icing layer on top left face -->
<polygon points="192,460 222,340 218,340 188,460" fill="#F5EAD8" opacity="0.15"/>
<!-- white icing drip on top point -->
<path d="M215,345 Q222,332 229,345 Q226,358 222,365 Q218,358 215,345 Z" fill="#fff"/>
<!-- chocolate texture lines -->
<line x1="200" y1="420" x2="240" y2="380" stroke="#5A2810" stroke-width="1.5" opacity="0.4"/>
<line x1="205" y1="440" x2="245" y2="400" stroke="#5A2810" stroke-width="1.5" opacity="0.4"/>
<line x1="197" y1="458" x2="250" y2="430" stroke="#5A2810" stroke-width="1" opacity="0.3"/>
<!-- Red heart on slice -->
<g transform="translate(222,408)">
  <path d="M0,10 Q-14,-2 -14,-10 Q-14,-20 0,-12 Q14,-20 14,-10 Q14,-2 0,10 Z" fill="#D02040"/>
</g>
<!-- white icing top edge -->
<line x1="192" y1="460" x2="252" y2="460" stroke="#E8D0B8" stroke-width="3"/>

<!-- ═══════════════════════════════════════════════════
