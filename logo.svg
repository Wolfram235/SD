  <ellipse cx="0"  cy="4"  rx="1.5" ry="1" fill="#fff" opacity="0.7"/>
</g>

<!-- Pink half heart on frosting right side -->
<g transform="translate(316,334)">
  <path d="M0,8 Q0,-6 7,-6 Q14,-6 14,2 Q14,8 0,18 Z" fill="#F060A0" opacity="0.9"/>
</g>

<!-- BALLOONS — 2 round + 1 heart, floating above -->
<!-- Left round balloon -->
<ellipse cx="278" cy="280" rx="22" ry="27" fill="#F4A8C0" opacity="0.9"/>
<ellipse cx="272" cy="270" rx="7"  ry="9"  fill="#fff" opacity="0.2"/>
<path d="M278,307 Q282,325 295,338" stroke="#C07090" stroke-width="1.3" fill="none"/>

<!-- Heart balloon (center, slightly higher) -->
<g transform="translate(305,255)">
  <path d="M0,22 Q-22,4 -22,-8 Q-22,-22 0,-14 Q22,-22 22,-8 Q22,4 0,22 Z" fill="#F07090" opacity="0.9"/>
  <ellipse cx="-7" cy="-10" rx="6" ry="8" fill="#fff" opacity="0.18"/>
  <path d="M0,22 Q2,34 5,42" stroke="#C07090" stroke-width="1.3" fill="none"/>
</g>

<!-- Right round balloon -->
<ellipse cx="332" cy="280" rx="22" ry="27" fill="#ECA0BA" opacity="0.9"/>
<ellipse cx="326" cy="270" rx="7"  ry="9"  fill="#fff" opacity="0.2"/>
<path d="M332,307 Q328,325 315,338" stroke="#C07090" stroke-width="1.3" fill="none"/>

<!-- sparkle right of cupcake -->
<g transform="translate(356,350)" opacity="0.75">
  <line x1="0" y1="-10" x2="0" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="-10" y1="0" x2="10" y2="0" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fff" stroke-width="1"/>
  <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fff" stroke-width="1"/>
</g>

