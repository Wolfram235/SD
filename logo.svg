<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600"  >
<defs>
  <radialGradient id="bg" cx="50%" cy="44%" r="50%">
    <stop offset="0%" stop-color="#C06070"/>
    <stop offset="100%" stop-color="#9A4058"/>
  </radialGradient>
  <style>
    @font-face {
      font-family: "MoonTime";
      src: url("fonts/MoonTime.577871180da84d8161e23cb65e0ce6f.fcdb844429fdf1f9b3c6249ffe70b3ab.woff2") format("woff2");
    }
    @font-face {
      font-family: "Bellaboo";
      src: url("fonts/Bellaboo.af3cb708a645c6c2a83383a39767eaa.4a4730f5ca07a302e99953a7857b86ba.woff2") format("woff2");
    }
    .t1 { font-family:"MoonTime"; }
    .t2 { font-family:"Bellaboo"; }
  </style>
</defs>

<!-- BG CIRCLE -->
<circle cx="300" cy="300" r="278" fill="url(#bg)"/>

<!-- ═══════════════════════════════════════════════════
